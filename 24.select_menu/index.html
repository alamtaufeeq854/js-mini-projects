<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../images/select.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <title>Select Menu</title>
  </head>
  <body>
    <a href="../index.html" class="back-btn">← Back to Projects</a>
    <div class="hero">
      <div class="selector">
        <div id="selectField">
          <p id="selectText">Select Social Media</p>
          <img src="../images/arrow-3.png" id="arrowIcon" />
        </div>

        <ul id="list" class="hide">
          <li class="options">
            <img src="../images/linkedin.png" />
            <p>Linkedin</p>
          </li>

          <li class="options">
            <img src="../images/github.png" />
            <p>Github</p>
          </li>

          <li class="options">
            <img src="../images/google.png" />
            <p>Google</p>
          </li>

          <li class="options">
            <img src="../images/tweet.png" />
            <p>Twitter</p>
          </li>

          <li class="options">
            <img src="../images/youtube.png" />
            <p>Youtube</p>
          </li>

          <li class="options">
            <img src="../images/whatsapp.png" />
            <p>Whatsapp</p>
          </li>

          <li class="options">
            <img src="../images/instagram.png" />
            <p>Instagram</p>
          </li>

          <li class="options">
            <img src="../images/facebook.png" />
            <p>Facebook</p>
          </li>
        </ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
