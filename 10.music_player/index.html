<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/e2cd747cbb.js"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="../images/music.png" type="image/png" />
    <title>Music Player</title>
  </head>
  <body>
    <a href="../index.html" class="back-btn">← Back to Projects</a>
    <div class="container">
      <div class="music-player">
        <nav>
          <div class="circle">
            <i class="fa-solid fa-angle-left"></i>
          </div>
          <div class="circle">
            <i class="fa-solid fa-bars"></i>
          </div>
        </nav>
        <img src="../images/song.jpg" class="song-img" />
        <h1>Billie Eilish</h1>
        <p>Bad Guy</p>

        <audio id="song">
          <source src="../audio/song.mp3" type="audio/mpeg" />
        </audio>
        <input type="range" value="0" id="progress" />

        <div class="controls">
          <div><i class="fa-solid fa-backward" id="backward"></i></div>
          <div><i class="fa-solid fa-play" id="ctrlIcon"></i></div>
          <div><i class="fa-solid fa-forward" id="forward"></i></div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
