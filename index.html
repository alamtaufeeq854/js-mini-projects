<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Mini Projects</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet" />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <!-- 🎨 SOFT PREMIUM BACKGROUND -->

  <body
    class="bg-gradient-to-br from-indigo-100 via-slate-50 to-cyan-100 text-gray-800">
    <!-- HEADER -->
    <header
      class="sticky top-0 bg-white/80 backdrop-blur border-b border-gray-200 z-50">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1
          class="text-xl font-bold bg-gradient-to-r from-indigo-500 to-cyan-500 bg-clip-text text-transparent">
          JS Mini Projects 🚀
        </h1>

        <div class="flex gap-6 text-sm font-semibold">
          <a
            href="https://github.com/alamtaufeeq854"
            target="_blank"
            class="text-gray-700 hover:text-indigo-600 transition">
            GitHub
          </a>

          <a
            href="https://www.linkedin.com/in/alamtaufeeq854/"
            target="_blank"
            class="text-gray-700 hover:text-cyan-600 transition">
            LinkedIn
          </a>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="max-w-6xl mx-auto px-6 py-16 text-center">
      <h2
        class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-600 to-cyan-600 bg-clip-text text-transparent">
        JavaScript Projects ⚡
      </h2>

      <p class="mt-6 text-gray-800 max-w-xl mx-auto font-semibold">
        Fun & real-world JavaScript projects with clean UI ⚡
      </p>
    </section>

    <!-- PROJECTS -->
    <section class="max-w-6xl mx-auto px-6 pb-16">
      <h3 class="text-2xl font-bold text-center mb-10 text-gray-800">
        Projects Showcase
      </h3>

      <div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- FOOTER -->
    <footer class="text-center py-8 text-gray-600 text-sm font-semibold">
      Focused on building scalable and user-friendly web applications ⚡
    </footer>

    <!-- SCRIPT -->
    <script>
      const projects = [
        {
          id: "01",
          name: "Weather App",
          desc: "Live weather using API",
          live: "01.weather_app/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/01.weather_app",
          icon: "🌤️",
          color: "from-cyan-500 to-blue-600",
        },
        {
          id: "02",
          name: "To-Do List App",
          desc: "Task manager with localStorage support",
          live: "02.to_do_list_app/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/02.to_do_list_app",
          icon: "📝",
          color: "from-pink-500 to-purple-600",
        },
        {
          id: "03",
          name: "Quiz App",
          desc: "Interactive quiz with scoring and dynamic questions",
          live: "03.quiz_app/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/03.quiz_app",
          icon: "❓",
          color: "from-yellow-500 to-orange-600",
        },

        {
          id: "04",
          name: "Password Generator",
          desc: "Create strong and secure random passwords instantly",
          live: "04.password_generator/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/04.password_generator",
          icon: "🔐",
          color: "from-green-500 to-emerald-600",
        },

        {
          id: "05",
          name: "Notes App",
          desc: "Create, edit, and save notes with localStorage support",
          live: "05.notes_app/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/05.notes_app",
          icon: "📒",
          color: "from-indigo-500 to-purple-600",
        },

        {
          id: "06",
          name: "Age Calculator",
          desc: "Calculate age from date of birth with accurate results",
          live: "06.age_calculator_app/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/06.age_calculator_app",
          icon: "🎂",
          color: "from-rose-500 to-pink-600",
        },

        {
          id: "07",
          name: "Quote Generator",
          desc: "Fetch and display random quotes using API",
          live: "07.quote_generator/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/07.quote_generator",
          icon: "💬",
          color: "from-teal-500 to-emerald-600",
        },

        {
          id: "08",
          name: "QR Code Generator",
          desc: "Generate QR codes instantly using API",
          live: "08.qr_code_generator/index.html",
          code: "https://github.com/alamtaufeeq854/js-mini-projects/tree/main/08.qr_code_generator",
          icon: "📱",
          color: "from-emerald-500 to-green-600",
        },
      ];

      const grid = document.getElementById("grid");

      function render() {
        projects.forEach((p) => {
          const card = document.createElement("div");

          card.className =
            "bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition transform hover:-translate-y-2";

          card.innerHTML = `
        <!-- PROJECT NUMBER (SUBTLE BOLD) -->
        <div class="mb-3">
          <span class="text-sm font-bold px-3 py-1 bg-gray-200 text-gray-800 rounded-md">
            Project ${p.id}
          </span>
        </div>

        <!-- NAME + ICON -->
        <div class="flex items-center gap-2">
          <span class="text-lg">${p.icon}</span>
          <h4 class="text-lg font-bold bg-gradient-to-r ${p.color} bg-clip-text text-transparent">
            ${p.name}
          </h4>
        </div>

        <!-- DESC (BOLD) -->
        <p class="text-sm text-gray-700 mt-2 font-semibold">
          ${p.desc}
        </p>

        <!-- BUTTONS -->
        <div class="mt-5 flex gap-3">
          <a href="${p.live}" target="_blank"
            class="flex-1 text-center py-2 rounded-lg text-sm font-bold text-white bg-gradient-to-r ${p.color}">
            Live
          </a>

          <a href="${p.code}" target="_blank"
            class="flex-1 text-center border border-gray-300 py-2 rounded-lg text-sm font-semibold hover:bg-gray-100 transition">
            Code
          </a>
        </div>
      `;

          grid.appendChild(card);
        });
      }

      render();
    </script>
  </body>
</html>
