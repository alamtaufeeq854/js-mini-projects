<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../images/form.png" type="image/png" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/e2cd747cbb.js"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <a href="../index.html" class="back-btn">← Back to Projects</a>
    <div class="container">
      <form>
        <i class="fa-solid fa-paper-plane"></i>

        <div class="input-group">
          <label>Full Name</label>
          <input
            type="text"
            placeholder="Enter your name"
            id="contact-name"
            onkeyup="validateName()" />
          <span id="name-error"></span>
        </div>

        <div class="input-group">
          <label>Phone No.</label>
          <input
            type="tel"
            placeholder="123 456 7890"
            id="phone-name"
            onkeyup="validatePhone()" />
          <span id="phone-error"></span>
        </div>

        <div class="input-group">
          <label>Email Id</label>
          <input
            type="email"
            placeholder="Enter Email"
            id="email-name"
            onkeyup="validateEmail()" />
          <span id="email-error"></span>
        </div>

        <div class="input-group">
          <label>Your Message</label>
          <textarea
            rows="5"
            placeholder="Enter your message"
            id="message-name"
            onkeyup="validateMessage()"></textarea>
          <span id="message-error"></span>
        </div>

        <button onclick="return validateForm();">Submit</button>
        <span id="submit-error"></span>
      </form>

      <div class="useful-links">
        <a href="https://www.linkedin.com/in/alamtaufeeq854/">Linkedin</a>
        <a href="https://github.com/alamtaufeeq854">Github</a>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
